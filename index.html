<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <title>Crimson Print Supply Matrix</title>
 <script>
  let printerData = [];

  // Robust CSV parser that handles commas inside quotes
  function parseCSVLine(text) {
    const result = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < text.length; i++) {
      let char = text[i];
      if (char === '"') {
        inQuote = !inQuote;
      } else if (char === ',' && !inQuote) {
        result.push(cur.trim());
        cur = '';
      } else {
        cur += char;
      }
    }
    result.push(cur.trim());
    return result;
  }

  async function loadPrinterData() {
    try {
      const response = await fetch('printers.csv');
      const data = await response.text();
      const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
      const contentRows = rows.slice(1); 

      printerData = contentRows.map(row => {
        const cols = parseCSVLine(row);
        
        return {
          group: (cols[0] || "").replace(/"/g, ''),
          queuename: (cols[1] || "").replace(/"/g, ''), // Swapped to match your KBA order
          printername: (cols[2] || "").replace(/"/g, ''),
          address: (cols[3] || "").replace(/"/g, ''),
          managedBy: (cols[4] || "Department").replace(/"/g, ''),
          contact: (cols[5] || "TBD").replace(/"/g, ''),
          tonerAlert: (cols[6] || "Inactive").replace(/"/g, '')
        };
      }).filter(p => p.printername || p.queuename);

      renderPrinters();
    } catch (e) {
      console.error("Load Error:", e);
      document.getElementById('printerList').innerHTML = "<p>Error loading printers.csv.</p>";
    }
  }

  function handleSearch(event) {
    renderPrinters();
  }

  function renderPrinters() {
    const selectedDept = document.getElementById('deptFilter').value;
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const list = document.getElementById('printerList');

    const filtered = printerData.filter(p => {
      const matchesDept = (selectedDept === "All" || p.group.includes(selectedDept) || selectedDept.includes(p.group));
      const matchesSearch = p.printername.toLowerCase().includes(query) ||
                            p.address.toLowerCase().includes(query) ||
                            p.queuename.toLowerCase().includes(query) ||
                            p.group.toLowerCase().includes(query);
      return matchesDept && matchesSearch;
    });

    if (filtered.length === 0) {
      list.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 50px; color: #666;'>No printers found. Check your filters or search terms.</p>";
      return;
    }

    list.innerHTML = filtered.map(p => `
      <div class="printer-card">
        <span class="status-badge">${p.group}</span>
        <h3>${p.printername || 'Unnamed Printer'}</h3>
        <div class="info-row"><b>Queue:</b> ${p.queuename}</div>
        <div class="info-row"><b>Location:</b> ${p.address}</div>
        <hr>
        <div class="contact-box">
          <div class="info-row"><b>Managed:</b> ${p.managedBy}</div>
          <div class="info-row"><b>Contact:</b> ${p.contact}</div>
          <div class="info-row"><b>Toner:</b> ${p.tonerAlert.toLowerCase().includes('active') ? '🟢 Active' : '🔴 Inactive'}</div>
        </div>
      </div>
    `).join('');
  }

  loadPrinterData();
</script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-container">
      <img src="Logo.png" class="logo" alt="Harvard Logo">
    </div>
  </header>
  
<div class="header">
  <h1>Crimson Print Supply & Alert Monitoring</h1>
  <p>Product Management Matrix</p>
</div>

<div class="container">
  <div class="controls">
    <select id="deptFilter" onchange="renderPrinters()">
      <option value="All">All Groups</option>
      <option value="Central Administration (CADM)">Central Administration (CADM)</option>
      <option value="Harvard Divinity School">Harvard Divinity School</option>
      <option value="Harvard Graduate School of Arts and Sciences">Harvard Graduate School of Arts and Sciences</option>
      <option value="Harvard Radcliffe Institute for Advanced Study">Radcliffe Institute</option>
      <option value="Harvard Faculty of Arts and Sciences">Harvard Faculty of Arts and Sciences</option>
      <option value="Harvard Student Agencies">Harvard Student Agencies</option>
      <option value="Harvard John A. Paulson School of Engineering and Applied Sciences">Harvard John A. Paulson School of Engineering and Applied Sciences</option>
      <option value="Harvard T.H. Chan School of Public Health">Harvard T.H. Chan School of Public Health</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search by Printer Name, Building, or Room..." onkeyup="handleSearch(event)">
  </div>

  <div id="printerList">
    </div>
</div>

<script>
  let printerData = [];

  async function loadPrinterData() {
    try {
      const response = await fetch('printers.csv');
      const data = await response.text();
      // Split by newline and remove empty lines
      const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
      const contentRows = rows.slice(1); // Skip header

      printerData = contentRows.map(row => {
        // This regex handles commas inside quotes (common in addresses)
        const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
        
        return {
          group: (cols[0] || "").replace(/"/g, '').trim(),
          printername: (cols[1] || "").replace(/"/g, '').trim(),
          queuename: (cols[2] || "").replace(/"/g, '').trim(),
          address: (cols[3] || "").replace(/"/g, '').trim(),
          managedBy: (cols[4] || "Department").replace(/"/g, '').trim(),
          contact: (cols[5] || "TBD").replace(/"/g, '').trim(),
          tonerAlert: (cols[6] || "Inactive").replace(/"/g, '').trim()
        };
      }).filter(p => p.printername);

      renderPrinters();
    } catch (e) {
      console.error("Load Error:", e);
      document.getElementById('printerList').innerHTML = "<p>Error loading printers.csv.</p>";
    }
  }

  function handleSearch(event) {
    renderPrinters();
  }

  function renderPrinters() {
    const selectedDept = document.getElementById('deptFilter').value;
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const list = document.getElementById('printerList');

    const filtered = printerData.filter(p => {
      const matchesDept = (selectedDept === "All" || p.group === selectedDept);
      
      const matchesSearch = p.printername.toLowerCase().includes(query) ||
                            p.address.toLowerCase().includes(query) ||
                            p.queuename.toLowerCase().includes(query);
      return matchesDept && matchesSearch;
    });

    if (filtered.length === 0) {
      list.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 50px; color: #666;'>No printers found matching your search.</p>";
      return;
    }

    list.innerHTML = filtered.map(p => `
      <div class="printer-card">
        <span class="status-badge managed-${p.group.toLowerCase().replace(/\s+/g, '')}">${p.group}</span>
        <h3>${p.printername}</h3>
          <div class="info-row"><b>Queue:</b> ${p.queuename}</div>
          <div class="info-row"><b>Location:</b> ${p.address}</div>
        
        <hr>
        
        <div class="contact-box">
          <div class="info-row"><b>Managed:</b> ${p.managedBy}</div>
          <div class="info-row"><b>Contact:</b> ${p.contact}</div>
          <div class="info-row"><b>Toner:</b> ${p.tonerAlert.toLowerCase().includes('active') ? '🟢 Active' : '🔴 Inactive'}</div>
        </div>
      </div>
    `).join('');
  }

  loadPrinterData();
</script>
</body>
</html>
